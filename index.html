<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ── Palette (overridden by tweak) ─────────────── */
  :root {
    --cream: #F8F2E8;
    --beige: #EAE0D0;
    --beige-deep: #DCCDB5;
    --honey: #D4A574;
    --honey-deep: #B8895A;
    --sage: #6B8359;
    --sage-deep: #4A5D3A;
    --ink: #2A2522;
    --ink-soft: #5C544E;
    --muted: #8C857E;
    --line: #E5DAC6;
  }
  body[data-palette="honey"] {
    --cream: #FBF4E6;
    --beige: #F2E4CA;
    --beige-deep: #E5D0AB;
    --honey: #C68B4A;
    --honey-deep: #A06F33;
    --sage: #8A7048;
    --sage-deep: #6B5634;
    --ink: #3A2A1B;
    --ink-soft: #6B5640;
    --muted: #9C8B73;
    --line: #EBDEC2;
  }
  body[data-palette="sage"] {
    --cream: #F2EFE6;
    --beige: #E0DCCC;
    --beige-deep: #C9C5B3;
    --honey: #B59868;
    --honey-deep: #8E7547;
    --sage: #5C7048;
    --sage-deep: #3D5030;
    --ink: #2A2E22;
    --ink-soft: #50544A;
    --muted: #80847A;
    --line: #D9D5C5;
  }

  /* ── Typography ─────────────── */
  .serif { font-family: 'Fraunces', Georgia, serif; font-weight: 400; letter-spacing: -0.015em; }
  .script { font-family: 'Caveat', cursive; font-weight: 500; }
  .eyebrow {
    font-family: 'Inter Tight', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    font-weight: 500;
    color: var(--honey-deep);
  }

  /* ── Buttons ─────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 36px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 999px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    text-decoration: none;
    transition: transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease, background-color .3s ease;
    box-shadow: 0 6px 24px rgba(42,37,34,0.18);
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transform: translateX(-110%);
    transition: transform .9s ease;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(42,37,34,0.28); }
  .btn:hover::after { transform: translateX(110%); }
  .btn--ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
    box-shadow: none;
  }
  .btn--ghost:hover { background: var(--ink); color: var(--cream); }
  .btn--cream {
    background: var(--cream);
    color: var(--ink);
  }
  .btn--cream:hover { background: #fff; }

  /* ── Reveals ─────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: .1s; }
  .reveal.d2 { transition-delay: .2s; }
  .reveal.d3 { transition-delay: .3s; }
  .reveal.d4 { transition-delay: .4s; }
  .reveal.d5 { transition-delay: .5s; }

  /* ── Container ─────────────── */
  .container {
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 640px) {
    .container { padding: 0 22px; }
  }

  /* ── Section spacing ─────────────── */
  section { position: relative; }

  /* ── Animations ─────────────── */
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(4deg); }
  }
  @keyframes drift-slow {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(20px, -16px); }
    66% { transform: translate(-15px, 12px); }
  }
  @keyframes paw-float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.45; }
    90% { opacity: 0.25; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }
  @keyframes heart-float {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    20% { opacity: 0.7; }
    100% { transform: translateY(-180px) scale(1) rotate(15deg); opacity: 0; }
  }
  @keyframes underline-grow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  @keyframes shimmer-text {
    0% { background-position: -150% 50%; }
    100% { background-position: 150% 50%; }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.025); }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes scroll-cue {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  .float-soft { animation: drift 6s ease-in-out infinite; }
  .float-slow { animation: drift-slow 14s ease-in-out infinite; }
  .breathe { animation: breathe 4s ease-in-out infinite; }

  /* Script underline that draws in on reveal */
  .underline-script {
    position: relative;
    display: inline-block;
  }
  .underline-script svg {
    position: absolute;
    left: -4%;
    bottom: -14px;
    width: 108%;
    height: 18px;
    stroke: var(--honey);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 1.2s cubic-bezier(.2,.7,.2,1) .4s;
  }
  .reveal.in .underline-script svg { transform: scaleX(1); }

  /* ── Selection / scrollbar ─────────────── */
  ::selection { background: var(--honey); color: var(--cream); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--beige-deep); border-radius: 999px; }

  /* ── Reduced motion ─────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
